name: Tests

"on":
    push:
        branches:
            - "main"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        timeout-minutes: 5
        runs-on: ubuntu-latest
        strategy:
          matrix:
            py: ["3.12", "3.14"]

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v4
              with:
                  python-version: ${{ matrix.py }}
                  cache: "pip"

            - name: Install deps
              run: pip install flit pytest shtab

            - name: Install us
              run: pip install .

            - name: Test
              run: pytest
