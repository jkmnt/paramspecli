[project]
site_name = "paramspecli - type-safe facade for the argparse"
site_description = "paramspecli - type-safe facade for the argparse"
site_author = "jkmnt"
site_url = "https://jkmnt.github.io/paramspecli/"
repo_url = "https://github.com/jkmnt/paramspecli"

nav = [
    { "Intro" = "index.md" },
    { "Basic usage" = "basic.md" },
    { "Advanced usage" = "advanced.md" },
    { "Generating documentation" = "doc.md" },
    { "Extending" = "extending.md" },
    { "Q&A" = "qa.md" },
]

# extra_css = ["extra.css"]

[project.theme]

variant = "classic"
# font = false
logo = "logo.svg"
favicon = "favicon.png"
features = [
    "content.code.copy",
    "content.code.select",
    # "header.autohide",
    # "navigation.expand",
    "navigation.footer",
    #"navigation.indexes",
    #"navigation.instant",
    #"navigation.instant.prefetch",
    #"navigation.instant.progress",
    #"navigation.path",
    #"navigation.prune",
    #"navigation.sections",
    #"navigation.tabs",
    #"navigation.tabs.sticky",
    #"navigation.top",
    "navigation.tracking",
    #"search.highlight",
    # "toc.follow",
    "toc.integrate",
]
[project.theme.palette]
scheme = "default"
primary = "black"
# accent = "green"


[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.highlight]
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.extra.version]
provider = "mike"